name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Tracey version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Both
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS version
      placeholder: "Android 15 / iOS 18"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install Tracey with TraceyHost
        2. Navigate to DetailScreen
        3. Tap "Add to Cart"
        4. Call Tracey.capture()
        5. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logcat / console output
      render: text
